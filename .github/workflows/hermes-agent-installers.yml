name: Test Hermes Agent Installers

on:
  workflow_dispatch:

jobs:
  test-original-installers:
    name: Install on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Run install.sh (Ubuntu)
        if: runner.os != 'Windows'
        run: curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash

      - name: Run install.ps1 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: iex (irm https://hermes-agent.nousresearch.com/install.ps1)

      # Verifies the clone actually succeeded — this is the path that
      # exercises the SSH → HTTPS fallback (no GitHub key on the runner).
      - name: Verify clone (Ubuntu)
        if: runner.os != 'Windows'
        run: |
          test -d "$HOME/.hermes/hermes-agent/.git" || { echo "clone missing"; exit 1; }
          echo "repo present: $(git -C "$HOME/.hermes/hermes-agent" rev-parse HEAD)"
          "$HOME/.hermes/hermes-agent/venv/bin/hermes" --version

      - name: Verify clone (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $p = if ($env:HERMES_HOME) {
                 Join-Path $env:HERMES_HOME "hermes-agent"
               } else {
                 Join-Path $env:LOCALAPPDATA "hermes\hermes-agent"
               }
          if (-not (Test-Path "$p\.git")) { Write-Error "clone missing"; exit 1 }
          Write-Host "repo present: $(git -C $p rev-parse HEAD)"
          & "$p\venv\Scripts\hermes.exe" --version
